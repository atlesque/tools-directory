<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background: rounded square -->
  <rect width="64" height="64" rx="16" fill="#1a1a2e"/>
  <!-- Stylized wrench/hex-nut motif: a hexagon with a circular cutout -->
  <circle cx="32" cy="32" r="12" fill="#e94560"/>
  <!-- Tool cross: a plus-like shape evoking tools/craft -->
  <rect x="28" y="14" width="8" height="14" rx="3" fill="#e94560"/>
  <rect x="14" y="28" width="14" height="8" rx="3" fill="#e94560"/>
  <rect x="28" y="36" width="8" height="14" rx="3" fill="#e94560"/>
  <rect x="36" y="28" width="14" height="8" rx="3" fill="#e94560"/>
  <!-- Center accent -->
  <circle cx="32" cy="32" r="5" fill="#1a1a2e"/>
  <!-- Inner tool bit -->
  <rect x="30" y="20" width="4" height="8" rx="1.5" fill="#1a1a2e"/>
  <rect x="20" y="30" width="8" height="4" rx="1.5" fill="#1a1a2e"/>
  <rect x="30" y="36" width="4" height="8" rx="1.5" fill="#1a1a2e"/>
  <rect x="36" y="30" width="8" height="4" rx="1.5" fill="#1a1a2e"/>
</svg>
