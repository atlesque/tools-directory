<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background: rounded square -->
  <rect width="64" height="64" rx="16" fill="#1a1a2e"/>
  <!-- Wrench icon, rotated ~-30° -->
  <g transform="translate(32,32) rotate(-30) translate(-32,-32)">
    <!-- Handle -->
    <rect x="24" y="36" width="16" height="24" rx="4" fill="#e94560"/>
    <!-- Handle center cutout -->
    <rect x="28" y="38" width="8" height="20" rx="2" fill="#1a1a2e"/>
    <!-- Wrench jaw - upper arm -->
    <path d="M24 36 L24 18 Q24 10 32 10 Q40 10 40 18 L40 36" fill="#e94560"/>
    <!-- Jaw opening -->
    <path d="M28 34 L28 20 Q28 16 32 16 Q36 16 36 20 L36 34" fill="#1a1a2e"/>
    <!-- Jaw teeth/notches -->
    <rect x="26" y="28" width="4" height="3" rx="1" fill="#1a1a2e"/>
    <rect x="34" y="28" width="4" height="3" rx="1" fill="#1a1a2e"/>
  </g>
</svg>

